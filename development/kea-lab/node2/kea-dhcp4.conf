{
  "Dhcp4": {
    "interfaces-config": { "interfaces": [] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea4-ctrl-socket"
    },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },
    "valid-lifetime": 3600,
    "renew-timer": 900,
    "rebind-timer": 1800,
    "hooks-libraries": [
      { "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_lease_cmds.so" },
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_ha.so",
        "parameters": {
          "high-availability": [
            {
              "this-server-name": "node2",
              "mode": "hot-standby",
              "heartbeat-delay": 10000,
              "max-response-delay": 60000,
              "max-ack-delay": 5000,
              "max-unacked-clients": 5,
              "peers": [
                { "name": "node1", "url": "http://172.30.0.11:8000/", "role": "primary", "auto-failover": true },
                { "name": "node2", "url": "http://172.30.0.12:8000/", "role": "standby", "auto-failover": true }
              ]
            }
          ]
        }
      }
    ],
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.50.10.0/24",
        "pools": [ { "pool": "10.50.10.100 - 10.50.10.200" } ],
        "option-data": [
          { "name": "routers", "data": "10.50.10.1" },
          { "name": "domain-name-servers", "data": "10.50.10.2, 8.8.8.8" }
        ],
        "reservations": [
          { "hw-address": "00:11:22:33:44:55", "ip-address": "10.50.10.50", "hostname": "lab-printer" }
        ]
      },
      {
        "id": 2,
        "subnet": "10.50.20.0/24",
        "pools": [ { "pool": "10.50.20.100 - 10.50.20.200" } ]
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "severity": "INFO",
        "output_options": [ { "output": "stdout" } ]
      }
    ]
  }
}
